<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pixel Million</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        #canvas-container { 
            position: relative; display: inline-block; border: 3px solid #333; 
            background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            max-width: 98%; overflow: auto; margin-top: 10px;
        }

        canvas { display: block; cursor: crosshair; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }

        #payment-form {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #222; padding: 30px; border-radius: 15px; z-index: 1001; 
            width: 340px; text-align: left; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        input { width: 100%; padding: 12px; margin: 12px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }

        /* EFECTO BOTÓN QUE SE HUNDE */
        #pay-btn { 
            width: 100%; padding: 16px; background: #009ee3; color: white; border: none; 
            cursor: pointer; font-weight: bold; border-radius: 10px; font-size: 1.1em;
            box-shadow: 0 5px #007bbd; 
            transition: all 0.05s ease; 
            outline: none; margin-top: 10px;
        }

        #pay-btn:hover { background: #00aefb; }

        #pay-btn:active {
            transform: translateY(4px); 
            box-shadow: 0 1px #007bbd; 
            background: #0089c4;
        }

        .cancel-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.9em; cursor: pointer; }
        #price-tag { font-size: 2.2em; color: #27ae60; font-weight: 800; text-align: center; display: block; margin-bottom: 5px; }

        #toast {
            visibility: hidden; min-width: 250px; background: #27ae60; color: white;
            text-align: center; border-radius: 50px; padding: 16px; position: fixed;
            z-index: 2000; left: 50%; bottom: 40px; transform: translateX(-50%); font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 4s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 40px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>

    <h1>The Pixel Million</h1>
    <p>Selecciona un área de 10x10 píxeles o más para colocar tu marca.</p>

    <div id="canvas-container">
        <canvas id="pixelCanvas" width="1200" height="1000"></canvas>
    </div>

    <div id="toast">¡Gracias por tu compra! Tu logo aparecerá en unos instantes.</div>
    <div id="overlay" onclick="closeForm()"></div>

    <div id="payment-form">
        <span id="price-tag">$0</span>
        <p id="dim-text" style="text-align: center; color: #777; margin-bottom: 25px;"></p>
        
        <input type="email" id="email" placeholder="Email para comprobante">
        <input type="file" id="logoInput" accept="image/*">
        
        <button id="pay-btn">ADQUIRIR ESPACIO</button>
        <span class="cancel-link" onclick="closeForm()">Cancelar</span>
    </div>

    <script>
        const canvas = document.getElementById("pixelCanvas");
        const ctx = canvas.getContext("2d");
        const PIXEL_SIZE = 10;
        let isDrawing = false, startX, startY, currentX, currentY, seleccion = {}, ocupados = [];

        async function init() {
            try {
                const res = await fetch("/spaces");
                if (!res.ok) throw new Error("Error en red");
                ocupados = await res.json();
            } catch (e) { 
                console.error("Error cargando espacios:", e); 
                ocupados = []; 
            }
            render();
        }

        function render() {
            // Limpiar fondo
            ctx.fillStyle = "#000"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar grilla
            ctx.strokeStyle = "#1a1a1a";
            for(let i=0; i<canvas.width; i+=PIXEL_SIZE) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j=0; j<canvas.height; j+=PIXEL_SIZE) {
                ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // Dibujar logos con verificación de seguridad (Fix includes error)
            ocupados.forEach(s => {
                if (s && s.imageUrl && typeof s.imageUrl === 'string') {
                    const img = new Image();
                    const fileName = s.imageUrl.split('/').pop();
                    img.src = `/uploads/${fileName}`;
                    img.onload = () => ctx.drawImage(img, s.x, s.y, s.width, s.height);
                }
            });
        }

        function detectaChoque(x, y, w, h) {
            return ocupados.some(l => !(x + w <= l.x || x >= l.x + l.width || y + h <= l.y || y >= l.y + l.height));
        }

        canvas.onmousedown = (e) => {
            const r = canvas.getBoundingClientRect();
            startX = Math.floor((e.clientX - r.left) / PIXEL_SIZE) * PIXEL_SIZE;
            startY = Math.floor((e.clientY - r.top) / PIXEL_SIZE) * PIXEL_SIZE;
            isDrawing = true;
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            const r = canvas.getBoundingClientRect();
            currentX = Math.floor((e.clientX - r.left) / PIXEL_SIZE) * PIXEL_SIZE;
            currentY = Math.floor((e.clientY - r.top) / PIXEL_SIZE) * PIXEL_SIZE;
            
            render();
            const w = Math.abs(currentX - startX), h = Math.abs(currentY - startY);
            const x = Math.min(startX, currentX), y = Math.min(startY, currentY);

            ctx.strokeStyle = detectaChoque(x, y, w, h) ? "#ff4757" : "#009ee3"; 
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
        };

        canvas.onmouseup = () => {
            if (!isDrawing) return;
            isDrawing = false;
            const w = Math.abs(currentX - startX) || 10, h = Math.abs(currentY - startY) || 10;
            const x = Math.min(startX, currentX), y = Math.min(startY, currentY);

            if (detectaChoque(x, y, w, h)) { render(); return; }

            seleccion = { x, y, w, h };
            document.getElementById("price-tag").innerText = `$${(w*h*50).toLocaleString()}`;
            document.getElementById("dim-text").innerText = `${w}x${h} píxeles`;
            document.getElementById("payment-form").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        };

        document.getElementById("pay-btn").onclick = async () => {
            const email = document.getElementById("email").value;
            const file = document.getElementById("logoInput").files[0];
            if(!email || !file) return alert("Por favor completa los campos.");
            
            const btn = document.getElementById("pay-btn");
            btn.innerText = "Procesando...";
            btn.disabled = true;

            const fd = new FormData();
            fd.append("x", seleccion.x); fd.append("y", seleccion.y);
            fd.append("width", seleccion.w); fd.append("height", seleccion.h);
            fd.append("email", email); fd.append("logo", file);

            try {
                const res = await fetch("/create-payment", { method: "POST", body: fd });
                const data = await res.json();
                if (data.init_point) window.location.href = data.init_point;
                else alert("Error: " + (data.error || "No se pudo crear el pago"));
            } catch (e) { alert("Error de conexión con el servidor"); }
            
            btn.innerText = "ADQUIRIR ESPACIO";
            btn.disabled = false;
        };

        function closeForm() {
            document.getElementById("payment-form").style.display = "none";
            document.getElementById("overlay").style.display = "none";
            render();
        }

        window.onload = () => {
            init();
            if (new URLSearchParams(window.location.search).get('status') === 'approved') {
                document.getElementById("toast").className = "show";
                setTimeout(() => window.history.replaceState({}, "", "/"), 4000);
            }
        };
    </script>
</body>
</html>
