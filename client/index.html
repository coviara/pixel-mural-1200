<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Pixel Million</title>
    <style>
        /* Fondo Blanco y Estilo Limpio */
        body { background: #fdfdfd; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        h1 { font-weight: 300; letter-spacing: 1px; color: #111; }

        #canvas-container { 
            position: relative; display: inline-block; 
            border: 1px solid #ddd; background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 98%; overflow: auto; margin-top: 20px;
        }

        canvas { display: block; cursor: crosshair; }

        /* Formulario de Pago */
        #payment-form {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #333; padding: 30px; border-radius: 15px; z-index: 1001; 
            width: 320px; text-align: left; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid #eee;
        }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 1000; }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }

        /* BOTÓN CON EFECTO HUNDIDO */
        #pay-btn { 
            width: 100%; padding: 16px; background: #009ee3; color: white; border: none; 
            cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 1.1em;
            box-shadow: 0 5px #007bbd; position: relative; transition: all 0.1s; outline: none; margin-top: 10px;
        }
        #pay-btn:hover { background: #00aefb; }
        #pay-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #007bbd;
        }

        .btn-cancel { width: 100%; margin-top: 15px; background: none; color: #999; border: none; cursor: pointer; text-decoration: underline; }

        #toast {
            visibility: hidden; min-width: 280px; background: #2ecc71; color: white;
            text-align: center; border-radius: 50px; padding: 15px 30px; position: fixed;
            z-index: 2000; left: 50%; top: 30px; transform: translateX(-50%); font-weight: bold;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
        }
        #toast.show { visibility: visible; animation: slideDown 0.5s, slideUp 0.5s 4.5s; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 30px; opacity: 1; } }
        @keyframes slideUp { from { top: 30px; opacity: 1; } to { top: -50px; opacity: 0; } }
    </style>
</head>
<body>

    <h1>THE PIXEL MILLION</h1>
    <p style="color: #888;">$25 por píxel • Selecciona un área disponible para tu logo</p>

    <div id="canvas-container">
        <canvas id="pixelCanvas" width="1200" height="1000"></canvas>
    </div>

    <div id="toast">✅ ¡Pago aprobado! Tu espacio ha sido reservado.</div>
    <div id="overlay" onclick="closeForm()"></div>

    <div id="payment-form">
        <h2 style="margin-top:0; font-size: 1.4em;">Reservar Espacio</h2>
        <div id="price-tag">$0</div>
        <p id="dim-text" style="color: #888; margin-bottom: 20px; font-size: 0.9em;"></p>
        
        <input type="email" id="email" placeholder="Email para facturación">
        <input type="file" id="logoInput" accept="image/*">
        
        <button id="pay-btn">Pagar ahora</button>
        <button class="btn-cancel" onclick="closeForm()">Cancelar</button>
    </div>

    <script>
        const canvas = document.getElementById("pixelCanvas");
        const ctx = canvas.getContext("2d");
        const PIXEL_SIZE = 10;
        let isDrawing = false, startX, startY, currentX, currentY, seleccion = {}, ocupados = [];

        async function init() {
            const res = await fetch("/spaces");
            ocupados = await res.json();
            render();
        }

        function render() {
            ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#f0f0f0"; // Líneas muy suaves
            for(let i=0; i<canvas.width; i+=PIXEL_SIZE) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
            ocupados.forEach(s => {
                const img = new Image();
                img.src = s.imageUrl;
                img.onload = () => ctx.drawImage(img, s.x, s.y, s.width, s.height);
            });
        }

        function choca(x, y, w, h) {
            return ocupados.some(l => !(x + w <= l.x || x >= l.x + l.width || y + h <= l.y || y >= l.y + l.height));
        }

        canvas.onmousedown = (e) => {
            const r = canvas.getBoundingClientRect();
            startX = Math.floor((e.clientX - r.left) / PIXEL_SIZE) * PIXEL_SIZE;
            startY = Math.floor((e.clientY - r.top) / PIXEL_SIZE) * PIXEL_SIZE;
            isDrawing = true;
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            const r = canvas.getBoundingClientRect();
            currentX = Math.floor((e.clientX - r.left) / PIXEL_SIZE) * PIXEL_SIZE;
            currentY = Math.floor((e.clientY - r.top) / PIXEL_SIZE) * PIXEL_SIZE;
            render();
            const w = Math.abs(currentX - startX), h = Math.abs(currentY - startY);
            const x = Math.min(startX, currentX), y = Math.min(startY, currentY);
            ctx.strokeStyle = choca(x,y,w,h) ? "#ff4757" : "#009ee3";
            ctx.setLineDash([5, 5]); // Efecto de línea punteada
            ctx.strokeRect(x, y, w, h);
            ctx.setLineDash([]);
        };

        canvas.onmouseup = () => {
            if (!isDrawing) return;
            isDrawing = false;
            const w = Math.abs(currentX - startX) || 10, h = Math.abs(currentY - startY) || 10;
            const x = Math.min(startX, currentX), y = Math.min(startY, currentY);
            if(choca(x,y,w,h)) return render();
            seleccion = { x, y, w, h };
            document.getElementById("price-tag").innerText = `$${(w*h*25).toLocaleString()}`;
            document.getElementById("dim-text").innerText = `${w}x${h} píxeles en posición [${x},${y}]`;
            document.getElementById("payment-form").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        };

        document.getElementById("pay-btn").onclick = async () => {
            const email = document.getElementById("email").value;
            const file = document.getElementById("logoInput").files[0];
            if(!email || !file) return alert("Completa los datos");
            const fd = new FormData();
            fd.append("x", seleccion.x); fd.append("y", seleccion.y);
            fd.append("width", seleccion.w); fd.append("height", seleccion.h);
            fd.append("email", email); fd.append("logo", file);
            const res = await fetch("/create-payment", { method: "POST", body: fd });
            if(res.ok) {
                const data = await res.json();
                window.location.href = data.init_point;
            }
        };

        function closeForm() {
            document.getElementById("payment-form").style.display = "none";
            document.getElementById("overlay").style.display = "none";
            render();
        }

        window.onload = () => {
            init();
            if (new URLSearchParams(window.location.search).get('status') === 'approved') {
                const t = document.getElementById("toast");
                t.className = "show";
                setTimeout(() => { t.className = ""; window.history.replaceState({}, "", "/"); }, 5000);
            }
        };
    </script>
</body>
</html>
